# -- Install the NodeRedInstance CRD as part of this chart.
# Set to false if you manage CRDs separately.
installCRDs: true

# -- Namespace in which the operator runs.
# The namespace is created by this chart if it does not already exist.
namespace: niota-system

operator:
  # -- Number of operator replicas. Only one replica holds the leader-election
  # lease at a time; additional replicas are warm standbys.
  replicaCount: 1

  image:
    # -- Operator container image repository.
    repository: ghcr.io/godenja/niota-node-red-operator
    # -- Image tag. Defaults to the chart appVersion when left empty.
    tag: ""
    # -- Image pull policy.
    pullPolicy: IfNotPresent

  # -- Image pull secrets for the operator image.
  imagePullSecrets: []
  # - name: my-registry-secret

  # -- Enable leader election (recommended for production; required when
  # replicaCount > 1).
  leaderElect: true

  # -- Extra environment variables injected into the manager container.
  extraEnv: []
  # - name: MY_VAR
  #   value: "my-value"

  resources:
    limits:
      cpu: 128m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  # -- Pod-level security context.
  podSecurityContext:
    runAsNonRoot: true

  # -- Container-level security context.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  # -- Liveness probe settings.
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20

  # -- Readiness probe settings.
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

  # -- How long Kubernetes waits before force-killing the pod on shutdown.
  terminationGracePeriodSeconds: 10

  # -- Node selector for the operator pod.
  nodeSelector: {}

  # -- Tolerations for the operator pod.
  tolerations: []

  # -- Affinity rules for the operator pod.
  affinity: {}

  # -- Annotations to add to the operator pod.
  podAnnotations:
    kubectl.kubernetes.io/default-container: manager

serviceAccount:
  # -- Whether to create the ServiceAccount.
  create: true
  # -- Name override. Defaults to the full chart name.
  name: ""
  # -- Annotations to add to the ServiceAccount (e.g. IRSA or Workload Identity).
  annotations: {}
