---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "niota-node-red-operator.fullname" . }}
  namespace: {{ include "niota-node-red-operator.namespace" . }}
  labels:
    {{- include "niota-node-red-operator.labels" . | nindent 4 }}
    control-plane: {{ include "niota-node-red-operator.fullname" . }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      {{- include "niota-node-red-operator.selectorLabels" . | nindent 6 }}
      control-plane: {{ include "niota-node-red-operator.fullname" . }}
  template:
    metadata:
      labels:
        {{- include "niota-node-red-operator.selectorLabels" . | nindent 8 }}
        control-plane: {{ include "niota-node-red-operator.fullname" . }}
      annotations:
        {{- toYaml .Values.operator.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "niota-node-red-operator.serviceAccountName" . }}
      {{- with .Values.operator.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.operator.terminationGracePeriodSeconds }}
      {{- with .Values.operator.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "niota-node-red-operator.image" . }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /manager
          args:
            {{- if .Values.operator.leaderElect }}
            - --leader-elect
            {{- end }}
          {{- with .Values.operator.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: {{ .Values.operator.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: {{ .Values.operator.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.operator.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.operator.securityContext | nindent 12 }}
